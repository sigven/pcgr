context:
  name: pcgr
  version: 2.2.5.9003 # bump

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  path: ../../..

build:
  number: 0
  noarch: python
  script: pip install . --no-deps -v

requirements:
  host:
    - python >=3.12
    - pip
    - setuptools
  run:
    - python >=3.12
    - pandas
    - scipy
    - numpy
    - pip
    - bioconda::pybedtools
    - bioconda::cyvcf2
    - bioconda::htslib
    - conda-forge::pyyaml
    - conda-forge::libdeflate

tests:
  - script:
    - pcgr --version

about:
  homepage: https://sigven.github.io/pcgr
  summary: Personal Cancer Genome Reporter (PCGR). Variant interpretation for precision cancer medicine.
  license: MIT
  license_file: LICENSE
  repository: https://github.com/sigven/pcgr
  documentation: https://sigven.github.io/pcgr

extra:
  recipe-maintainers:
    - pdiakumis
