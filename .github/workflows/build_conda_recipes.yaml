name: deploy

on:
  push:
    branches:
      - main

env:
  conda_token: ${{ secrets.ANACONDA_UPLOAD_TOKEN }}
  conda_recipe: conda/recipe
  conda_env_yml: conda/env/yml
  conda_env_lock: conda/env/lock
  conda_org: pcgr
  VERSION: '2.2.5' # versioned by bump2version
jobs:
  build_pcgrr_conda_pkg:
    # When merging to one of the branches above and the commit message matches
    if: "startsWith(github.event.head_commit.message, 'Bump version:')"
    name: Build pcgrr conda pkg
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -l {0}
    steps:
      - name: 🚚 Code checkout
        uses: actions/checkout@v6
      - name: 👾 Miniforge setup
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          environment-file: ${{ env.conda_env_yml }}/condabuild.yml
          activate-environment: condabuild_env
          miniforge-version: latest
      - name: 🐍🔧 Conda pkg build
        run: |
          EXTRA_CHANNEL=""
          [[ "${{ github.ref }}" == "refs/heads/dev" ]] && EXTRA_CHANNEL="--channel ${{ env.conda_org }}/label/dev"
          rattler-build build \
            ${EXTRA_CHANNEL} \
            --channel ${{ env.conda_org }} \
            --channel bioconda \
            --channel conda-forge \
            --recipe ${conda_recipe}/pcgrr/recipe.yaml \
            --output-dir ${RUNNER_TEMP}/out_pcgrr
      - name: 🐍🪁 Conda pkg upload
        run: |
          pkg_path=$(find ${RUNNER_TEMP}/out_pcgrr -type f -name "*.conda")
          LABEL_ARG=""
          [[ "${{ github.ref }}" == "refs/heads/dev" ]] && LABEL_ARG="--channel dev"
          rattler-build upload anaconda \
            --owner ${{ env.conda_org }} \
            --api-key ${conda_token} \
            ${LABEL_ARG} \
            ${pkg_path}

  build_pcgr_conda_pkg:
    # When merging to one of the branches above and the commit message matches
    if: "startsWith(github.event.head_commit.message, 'Bump version:')"
    name: Build pcgr conda pkg
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -l {0}
    steps:
      - name: 🚚 Code checkout
        uses: actions/checkout@v6
      - name: 👾 Miniforge setup
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          environment-file: ${{ env.conda_env_yml }}/condabuild.yml
          activate-environment: condabuild_env
          miniforge-version: latest
      - name: 🐍🔧 Conda pkg build
        run: |
          EXTRA_CHANNEL=""
          [[ "${{ github.ref }}" == "refs/heads/dev" ]] && EXTRA_CHANNEL="--channel ${{ env.conda_org }}/label/dev"
          rattler-build build \
            ${EXTRA_CHANNEL} \
            --channel ${{ env.conda_org }} \
            --channel bioconda \
            --channel conda-forge \
            --recipe ${conda_recipe}/pcgr/recipe.yaml \
            --output-dir ${RUNNER_TEMP}/out_pcgr
      - name: 🐍🪁 Conda pkg upload
        run: |
          pkg_path=$(find ${RUNNER_TEMP}/out_pcgr -type f -name "*.conda")
          LABEL_ARG=""
          [[ "${{ github.ref }}" == "refs/heads/dev" ]] && LABEL_ARG="--channel dev"
          rattler-build upload anaconda \
            --owner ${{ env.conda_org }} \
            --api-key ${conda_token} \
            ${LABEL_ARG} \
            ${pkg_path}
      - name: 🔒 Conda lock
        run: |
          CHANNEL_ARGS="--channel ${{ env.conda_org }} --channel conda-forge"
          [[ "${{ github.ref }}" == "refs/heads/dev" ]] && CHANNEL_ARGS="--channel ${{ env.conda_org }}/label/dev ${CHANNEL_ARGS}"
          conda-lock lock \
            --file ${conda_env_yaml}/${pkg_name}.yaml \
            ${CHANNEL_ARGS} \
            -p linux-64
          conda-lock render \
            -p linux-64 \
            conda-lock.yml \
          && rm conda-lock.yml \
          && mv conda-linux-64.lock ${conda_env_lock}/

  conda_lock:
    name: Conda lock
    runs-on: ubuntu-latest
    needs: [build_pcgr_conda_pkg, build_pcgrr_conda_pkg]
    defaults:
      run:
        shell: bash -l {0}
    steps:
      - name: 🚚 Code checkout
        uses: actions/checkout@v6
      - name: Micromamba setup
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: ${{ env.conda_env_yml }}/condabuild.yml
      - name: 🔒 Conda lock
        run: |
          # 1. generate a combined lock file
          # 2. render platform-specific locks
          conda-lock lock --file ${conda_env_yml}/pcgr.yml -p osx-64 -p linux-64
          conda-lock render --kind explicit -p osx-64 -p linux-64 conda-lock.yml --filename-template 'pcgr-{platform}.lock' && rm conda-lock.yml
          conda-lock lock --file ${conda_env_yml}/pcgrr.yml -p osx-64 -p linux-64
          conda-lock render --kind explicit -p osx-64 -p linux-64 conda-lock.yml --filename-template 'pcgrr-{platform}.lock' && rm conda-lock.yml
          mv pcgrr-*.lock ${conda_env_lock}
          mv pcgr-*.lock ${conda_env_lock}
      - name: Commit changes
        run: |
          git status
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          MSG="[bot] Updating conda-lock files (v${VERSION})"
          git add .
          git commit -m "${MSG}"
          git push
      - name: 🌐 Website publish
        if: github.ref_name == 'main'
        run: |
          micromamba env create -n pkgdownenv -f ${conda_env_yml}/pkgdown.yml
          micromamba activate pkgdownenv
          cp pcgrr/DESCRIPTION . # hack for pkgdown to work
          printf "pcgrr version:\n"
          Rscript -e "packageVersion('pcgrr')"
          Rscript -e "pkgdown::deploy_to_branch(pkg = 'pcgrr', commit_message = 'Built PCGR website: https://sigven.github.io/pcgr/', branch = 'gh-pages', new_process = FALSE)"

  docker_deploy:
    name: Build and deploy Docker
    runs-on: ubuntu-latest
    needs: conda_lock
    defaults:
      run:
        shell: bash -l {0}
    steps:
      - name: 🚚 Code checkout
        uses: actions/checkout@v6
      - id: pull_lock_commit
        name: 📥 Pull lock commit
        run: |
            git pull --no-rebase # for pulling in the changed locks
            git --no-pager log --decorate=short --pretty=oneline -n3
            LATEST_COMMIT_HASH="$(git --no-pager log -1 --format='%H')"
            echo "latest_commit_hash=${LATEST_COMMIT_HASH}" >> $GITHUB_OUTPUT
      - name: 🔖 Tag creation
        uses: actions/github-script@v8
        env:
          LATEST_COMMIT_HASH: ${{ steps.pull_lock_commit.outputs.latest_commit_hash }}
        with:
          script: |
            const the_tag_name = 'refs/tags/v' + process.env.VERSION
            const the_sha = process.env.LATEST_COMMIT_HASH
            github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: the_tag_name,
              sha: the_sha
            })

      - name: 🗑 Free Disk Space
        uses: jlumbroso/free-disk-space@main
      # work with tag from above
      - name: 🚚 Code checkout
        uses: actions/checkout@v6
        with:
          ref: v${{ env.VERSION }}
      - name: 🏰 QEMU setup
        uses: docker/setup-qemu-action@v4
      - name: 🏯 Buildx setup
        uses: docker/setup-buildx-action@v4
      - name: DockerHub login
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      # use the outputs=docker with dest to directly save to tar for apptainer
      - name: 🐳 Docker img build, tar and push to Docker Hub
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            sigven/pcgr:${{ env.VERSION }}
          outputs: type=docker,dest=pcgr_${{ env.VERSION }}.tar

      # Apptainer
      - name: Apptainer setup
        uses: eWaterCycle/setup-apptainer@v2
      - name: 🕹️ Apptainer build
        run: |
          ls -lSha
          df -h
          echo "Building Apptainer SIF"
          echo "---------------------------------"
          apptainer build pcgr_singularity_${VERSION}.sif docker-archive://pcgr_${VERSION}.tar
          echo "---------------------------------"
          ls -lSha
      - name: Upload SIF to GHCR
        run: |
          echo ${{ secrets.GITHUB_TOKEN }} | apptainer registry login -u ${{ github.actor }} --password-stdin oras://ghcr.io
          apptainer push pcgr_singularity_${VERSION}.sif oras://ghcr.io/${GITHUB_REPOSITORY}:${VERSION}.singularity
